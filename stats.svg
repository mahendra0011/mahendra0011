  <!-- Bar background -->
  <rect x="468" y="48" width="380" height="10" rx="5" fill="#eaeef2"/>
  <rect x="468" y="48" width="349" height="10" fill="#f1e05a"/>
<rect x="817" y="48" width="18" height="10" fill="#3178c6"/>
<rect x="835" y="48" width="11" height="10" fill="#563d7c"/>
<rect x="846" y="48" width="1" height="10" fill="#e34c26"/>
<rect x="847" y="48" width="1" height="10" fill="#3572A5"/>


  <circle cx="476" cy="76" r="5" fill="#f1e05a"/>
<text x="486" y="80" class="lang-name">JavaScript</text>
<text x="580" y="80" class="lang-pct">91.74%</text>
<circle cx="476" cy="101" r="5" fill="#3178c6"/>
<text x="486" y="105" class="lang-name">TypeScript</text>
<text x="580" y="105" class="lang-pct">4.64%</text>
<circle cx="476" cy="126" r="5" fill="#563d7c"/>
<text x="486" y="130" class="lang-name">CSS</text>
<text x="580" y="130" class="lang-pct">2.99%</text>
<circle cx="476" cy="151" r="5" fill="#e34c26"/>
<text x="486" y="155" class="lang-name">HTML</text>
<text x="580" y="155" class="lang-pct">0.38%</text>
<circle cx="660" cy="76" r="5" fill="#3572A5"/>
<text x="670" y="80" class="lang-name">Python</text>
<text x="770" y="80" class="lang-pct">0.22%</text>
<circle cx="660" cy="101" r="5" fill="#89e051"/>
<text x="670" y="105" class="lang-name">PowerShell</text>
<text x="770" y="105" class="lang-pct">0.03%</text>
<circle cx="660" cy="126" r="5" fill="#384d54"/>
<text x="670" y="130" class="lang-name">Dockerfile</text>
<text x="770" y="130" class="lang-pct">0.01%</text>


  <!-- Streak card -->
  <rect x="10" y="225" width="880" height="195" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <line x1="303" y1="255" x2="303" y2="400" stroke="#d0d7de" stroke-width="1"/>
  <line x1="597" y1="255" x2="597" y2="400" stroke="#d0d7de" stroke-width="1"/>

  <!-- Total Contributions -->
  <text x="151" y="315" text-anchor="middle" class="st-big">1,908</text>
  <text x="151" y="343" text-anchor="middle" class="st-label">Total Contributions</text>
  <text x="151" y="362" text-anchor="middle" class="st-date">Nov 7, 2024 - Present</text>

  <!-- Current Streak -->
  <circle cx="450" cy="308" r="44" fill="none" stroke="#fb8f44" stroke-width="5"/>
  <text x="450" y="274" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="20" fill="#fb8f44">🔥</text>
  <text x="450" y="320" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#fb8f44">0</text>
  <text x="450" y="366" text-anchor="middle" class="st-cur">Current Streak</text>
  <text x="450" y="384" text-anchor="middle" class="st-date">—</text>

  <!-- Longest Streak -->
  <text x="749" y="315" text-anchor="middle" class="st-big">23</text>
  <text x="749" y="343" text-anchor="middle" class="st-label">Longest Streak</text>
  <text x="749" y="362" text-anchor="middle" class="st-date">May 18 - Jun 9</text>

