<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>
      .title { font: 600 15px 'Segoe UI', sans-serif; fill: #1f6feb; }
      .label { font: 400 12px 'Segoe UI', sans-serif; fill: #24292f; }
      .value { font: 700 12px 'Segoe UI', sans-serif; fill: #24292f; }
      .value-blue { font: 700 12px 'Segoe UI', sans-serif; fill: #1f6feb; }
      .section-title { font: 600 15px 'Segoe UI', sans-serif; fill: #1f6feb; }
      .streak-big { font: 700 32px 'Segoe UI', sans-serif; fill: #24292f; }
      .streak-label { font: 400 13px 'Segoe UI', sans-serif; fill: #57606a; }
      .streak-date { font: 400 11px 'Segoe UI', sans-serif; fill: #57606a; }
      .streak-current { font: 700 13px 'Segoe UI', sans-serif; fill: #fb8f44; }
      .lang-name { font: 400 11px 'Segoe UI', sans-serif; fill: #24292f; }
      .lang-pct { font: 400 11px 'Segoe UI', sans-serif; fill: #57606a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="white"/>

  <!-- ═══ TOP LEFT: Stats Card ═══ -->
  <rect x="10" y="10" width="420" height="190" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>

  <!-- Stats title -->
  <text x="28" y="38" class="title">Mahendra Prajapati 's GitHub Stats</text>

  <!-- Row 1: Stars -->
  <text x="28" y="65" class="label">☆  Total Stars Earned:</text>
  <text x="240" y="65" class="value-blue">0</text>

  <!-- Row 2: Commits -->
  <text x="28" y="90" class="label">🕐  Total Commits:</text>
  <text x="240" y="90" class="value"><tspan font-weight="700">1,485</tspan></text>

  <!-- Row 3: PRs -->
  <text x="28" y="115" class="label">⑂  Total PRs:</text>
  <text x="240" y="115" class="value-blue">5</text>

  <!-- Row 4: Issues -->
  <text x="28" y="140" class="label">⊙  Total Issues:</text>
  <text x="240" y="140" class="value-blue">1</text>

  <!-- Row 5: Contributed -->
  <text x="28" y="165" class="label">⊟  Contributed to (last year):</text>
  <text x="240" y="165" class="value-blue">1,485</text>

  <!-- Rank circle -->
  <circle cx="370" cy="110" r="38" fill="none" stroke="#e6edf3" stroke-width="5"/>
  <circle cx="370" cy="110" r="38" fill="none" stroke="#1f6feb" stroke-width="5"
          stroke-dasharray="20 220" stroke-linecap="round"
          transform="rotate(-90 370 110)"/>
  <text x="370" y="116" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#57606a">C</text>

  <!-- ═══ TOP RIGHT: Languages Card ═══ -->
  <rect x="450" y="10" width="440" height="190" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>

  <text x="468" y="38" class="section-title">Most Used Languages</text>

  <!-- Lang bar -->
  <rect x="468" y="48" width="380" height="10" rx="5" fill="#eaeef2"/>
  <!-- JS bar (93%) -->
  <rect x="468" y="48" width="353" height="10" rx="5" fill="#f1e05a"/>
  <!-- CSS bar (3.5%) -->
  <rect x="821" y="48" width="13" height="10" rx="0" fill="#563d7c"/>
  <!-- Others -->
  <rect x="834" y="48" width="14" height="10" rx="0" fill="#3178c6"/>

  <!-- Lang list col 1 -->
  <circle cx="476" cy="80" r="5" fill="#f1e05a"/>
  <text x="486" y="84" class="lang-name">JavaScript</text>
  <text x="560" y="84" class="lang-name" fill="#57606a">93.04%</text>

  <circle cx="476" cy="105" r="5" fill="#563d7c"/>
  <text x="486" y="109" class="lang-name">CSS</text>
  <text x="560" y="109" class="lang-name" fill="#57606a">3.59%</text>

  <circle cx="476" cy="130" r="5" fill="#3178c6"/>
  <text x="486" y="134" class="lang-name">TypeScript</text>
  <text x="560" y="134" class="lang-name" fill="#57606a">2.83%</text>

  <circle cx="476" cy="155" r="5" fill="#e34c26"/>
  <text x="486" y="159" class="lang-name">HTML</text>
  <text x="560" y="159" class="lang-name" fill="#57606a">0.44%</text>

  <!-- Lang list col 2 -->
  <circle cx="626" cy="80" r="5" fill="#3572A5"/>
  <text x="636" y="84" class="lang-name">Python</text>
  <text x="710" y="84" class="lang-name" fill="#57606a">0.05%</text>

  <circle cx="626" cy="105" r="5" fill="#89e051"/>
  <text x="636" y="109" class="lang-name">PowerShell</text>
  <text x="730" y="109" class="lang-name" fill="#57606a">0.03%</text>

  <circle cx="626" cy="130" r="5" fill="#384d54"/>
  <text x="636" y="134" class="lang-name">Dockerfile</text>
  <text x="726" y="134" class="lang-name" fill="#57606a">0.02%</text>

  <!-- ═══ BOTTOM: Streak Card ═══ -->
  <rect x="10" y="220" width="880" height="190" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>

  <!-- Dividers -->
  <line x1="303" y1="250" x2="303" y2="390" stroke="#d0d7de" stroke-width="1"/>
  <line x1="597" y1="250" x2="597" y2="390" stroke="#d0d7de" stroke-width="1"/>

  <!-- Total Contributions -->
  <text x="151" y="310" text-anchor="middle" class="streak-big">1,485</text>
  <text x="151" y="335" text-anchor="middle" class="streak-label">Total Contributions</text>
  <text x="151" y="355" text-anchor="middle" class="streak-date">Nov 6, 2024 - Present</text>

  <!-- Current Streak (center) -->
  <circle cx="450" cy="305" r="42" fill="none" stroke="#fb8f44" stroke-width="5"/>
  <text x="450" y="270" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#fb8f44">🔥</text>
  <text x="450" y="315" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="26" font-weight="700" fill="#fb8f44">2</text>
  <text x="450" y="360" text-anchor="middle" class="streak-current">Current Streak</text>
  <text x="450" y="378" text-anchor="middle" class="streak-date">Jun 27 - Jun 28</text>

  <!-- Longest Streak -->
  <text x="749" y="310" text-anchor="middle" class="streak-big">23</text>
  <text x="749" y="335" text-anchor="middle" class="streak-label">Longest Streak</text>
  <text x="749" y="355" text-anchor="middle" class="streak-date">May 18 - Jun 9</text>

</svg>